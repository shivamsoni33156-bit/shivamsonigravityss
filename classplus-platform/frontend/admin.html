<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Classplus</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <button class="hamburger" onclick="toggleSidebar()">☰</button>
  <nav class="sidebar mobile-hidden">
    <div class="sidebar-header">
      <div class="logo">Classplus</div>
    </div>
    <ul class="nav-list">
      <li class="nav-item" onclick="loadPage('dashboard.html')"><a class="nav-link">🏠 Dashboard</a></li>
      <li data-role="admin" class="nav-item active"><a class="nav-link">⚙️ Admin</a></li>
      <li class="nav-item" onclick="logout()"><a class="nav-link">🚪 Logout</a></li>
    </ul>
  </nav>
  <main class="main-content">
    <div class="container">
      <h1>Admin Panel</h1>
      <button class="btn" onclick="loadUsers()">Load Users</button>
      <button class="btn btn-secondary" onclick="loadPendingPayments()">Pending Payments</button>
      <button class="btn btn-secondary" onclick="loadPendingEnrolls()">Pending Enrollments</button>
      
      <div id="adminData" style="margin-top: 20px;">
        <!-- Data loaded here -->
      </div>
    </div>
  </main>
  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
