<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payments - Classplus</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <button class="hamburger" onclick="toggleSidebar()">☰</button>
  <nav class="sidebar mobile-hidden">
    <div class="sidebar-header">
      <div class="logo">Classplus</div>
    </div>
    <ul class="nav-list">
      <li class="nav-item" onclick="loadPage('dashboard.html')"><a class="nav-link">🏠 Dashboard</a></li>
      <li class="nav-item" onclick="loadPage('courses.html')"><a class="nav-link">📚 Courses</a></li>
      <li class="nav-item" onclick="loadPage('payments.html')"><a class="nav-link">💳 Payments</a></li>
      <li class="nav-item" onclick="logout()"><a class="nav-link">🚪 Logout</a></li>
    </ul>
  </nav>
  <main class="main-content">
    <div class="container">
      <h1>Course Payment</h1>
      <form id="paymentForm" enctype="multipart/form-data">
        <div class="form-group">
          <label>Course ID</label>
          <input type="number" id="course_id" placeholder="e.g. 1" required>
        </div>
        <div class="form-group">
          <label>Amount (₹)</label>
          <input type="number" id="amount" step="0.01" required>
        </div>
        <div class="form-group">
          <label>Payment Proof (Screenshot)</label>
          <input type="file" id="proof" accept="image/*">
        </div>
        <p><strong>UPI:</strong> PhonePe / Google Pay: <strong>7229985050</strong></p>
        <p><strong>Bank:</strong> SBI Acct: 30392342115, Zakir Husain</p>
        <button type="submit" class="btn btn-success">Submit Payment Proof</button>
      </form>
      <h3>Payment History</h3>
      <div id="historyList">Loading...</div>
    </div>
  </main>
  <script src="js/app.js"></script>
  <script src="js/payments.js"></script>
</body>
</html>
