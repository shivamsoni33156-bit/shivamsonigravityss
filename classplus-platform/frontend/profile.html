<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Classplus</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <button class="hamburger" onclick="toggleSidebar()">☰</button>
  <nav class="sidebar mobile-hidden">
    <!-- sidebar -->
    <div class="sidebar-header">
      <div class="logo">Classplus</div>
    </div>
    <ul class="nav-list">
      <li class="nav-item" onclick="loadPage('dashboard.html')"><a class="nav-link">Dashboard</a></li>
      <li class="nav-item active"><a class="nav-link">Profile</a></li>
      <li class="nav-item" onclick="logout()"><a class="nav-link">Logout</a></li>
    </ul>
  </nav>
  <main class="main-content">
    <div class="container">
      <h1>Profile</h1>
      <div id="profileInfo" class="card" style="max-width: 400px;">
        Loading...
      </div>
    </div>
  </main>
  <script src="js/app.js"></script>
  <script>
    apiCall('/auth/profile').then(data => {
      document.getElementById('profileInfo').innerHTML = `
        <h3>${data.username}</h3>
        <p>Role: ${data.role}</p>
      `;
    });
  </script>
</body>
</html>
