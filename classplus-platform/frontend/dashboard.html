<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Classplus</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <button class="hamburger" onclick="toggleSidebar()">☰</button>
  <nav class="sidebar mobile-hidden">
    <div class="sidebar-header">
      <div class="logo">Classplus</div>
    </div>
    <ul class="nav-list">
      <li class="nav-item active" onclick="loadPage('dashboard.html')">
        <a class="nav-link">🏠 Dashboard</a>
      </li>
      <li class="nav-item" onclick="loadPage('courses.html')">
        <a class="nav-link">📚 Courses</a>
      </li>
      <li class="nav-item" onclick="loadPage('materials.html')">
        <a class="nav-link">📖 Materials</a>
      </li>
      <li data-role="student" class="nav-item" onclick="loadPage('payments.html')">
        <a class="nav-link">💳 Payments</a>
      </li>
      <li data-role="teacher,admin" class="nav-item" onclick="loadPage('profile.html')">
        <a class="nav-link">👤 Profile</a>
      </li>
      <li data-role="admin" class="nav-item" onclick="loadPage('admin.html')">
        <a class="nav-link">⚙️ Admin</a>
      </li>
      <li class="nav-item" onclick="logout()">
        <a class="nav-link">🚪 Logout</a>
      </li>
    </ul>
  </nav>
  <main class="main-content">
    <div class="container">
      <h1 data-role="teacher">Teacher Dashboard</h1>
      <h1 data-role="student">Student Dashboard</h1>
      <h1 data-role="admin">Admin Dashboard</h1>
      
      <!-- Teacher Cards -->
      <div data-role="teacher" class="dashboard-grid" id="teacherCards">
        <div class="card">
          <div class="card-title">Total Students</div>
          <div class="card-value" id="totalStudents">0</div>
        </div>
        <div class="card">
          <div class="card-title">Total Courses</div>
          <div class="card-value" id="totalCourses">0</div>
        </div>
        <div class="card">
          <div class="card-title">Earnings</div>
          <div class="card-value" id="earnings">₹0</div>
        </div>
      </div>

      <!-- Student Enrolled -->
      <div data-role="student" class="course-grid" id="studentCourses">
        <p>Your Enrolled Courses will appear here.</p>
      </div>

      <!-- Admin Stats -->
      <div data-role="admin">
        <div class="dashboard-grid">
          <div class="card">Users: <span id="totalUsers">-</span></div>
        </div>
      </div>
    </div>
  </main>
  <script src="js/app.js"></script>
  <script src="js/teacher.js"></script>
  <script src="js/student.js"></script>
  <script src="js/admin.js"></script>
</body>

</html>
