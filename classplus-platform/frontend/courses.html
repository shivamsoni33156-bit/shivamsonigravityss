<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses - Classplus</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <button class="hamburger" onclick="toggleSidebar()">☰</button>
  <nav class="sidebar mobile-hidden">
    <!-- Same sidebar as dashboard -->
    <div class="sidebar-header">
      <div class="logo">Classplus</div>
    </div>
    <ul class="nav-list">
      <li class="nav-item" onclick="loadPage('dashboard.html')"><a class="nav-link">🏠 Dashboard</a></li>
      <li class="nav-item active" onclick="loadPage('courses.html')"><a class="nav-link">📚 Courses</a></li>
      <li class="nav-item" onclick="loadPage('materials.html')"><a class="nav-link">📖 Materials</a></li>
      <li data-role="student" class="nav-item" onclick="loadPage('payments.html')"><a class="nav-link">💳 Payments</a></li>
      <li class="nav-item" onclick="logout()"><a class="nav-link">🚪 Logout</a></li>
    </ul>
  </nav>
  <main class="main-content">
    <div class="container">
      <h1>Courses</h1>
      
      <!-- Teacher Create Form -->
      <div data-role="teacher" style="margin-bottom: 40px;">
        <h3>Create New Course</h3>
        <form id="courseForm">
          <div class="form-group">
            <label>Title</label>
            <input type="text" id="title" required>
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea id="description"></textarea>
          </div>
          <div class="form-group">
            <label>Price (₹)</label>
            <input type="number" id="price" step="0.01" value="0">
          </div>
          <button type="submit" class="btn">Create Course</button>
        </form>
      </div>

      <!-- Courses List -->
      <h3 data-role="teacher">My Courses</h3>
      <div class="course-grid" id="coursesList">
        <p>Loading...</p>
      </div>
    </div>
  </main>
  <script src="js/app.js"></script>
  <script src="js/teacher.js"></script>
</body>
</html>
